<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Born Being</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --ink: #000000;
    --ink-soft: #888888;
    --line: #ebebeb;
    --gap: 2px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    background:var(--bg);
    color:var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight:400;
    font-size:13px;
    line-height:1.5;
    letter-spacing:-0.005em;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body{overflow-x:hidden;}
  ::selection{background:#000;color:#fff;}

  /* —— HEADER —— */
  header{
    padding: 60px 24px 40px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
  }
  header .name{
    font-size:13px;
    font-weight:500;
    letter-spacing:-0.01em;
  }
  header .meta{
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0;
  }

  /* —— FEED GRID —— */
  .feed{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
    background:var(--line);
    border-bottom:1px solid var(--line);
  }
  .item{
    background:var(--bg);
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition: opacity 0.2s ease;
  }
  .item:hover{opacity:0.7;}
  .item .thumb{
    width:100%;
    aspect-ratio: 1 / 1;
    overflow:hidden;
    background:#f5f5f5;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .item .thumb img,
  .item .thumb video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .item .thumb.contain{
    background:#ffffff;
  }
  .item .thumb.contain img,
  .item .thumb.contain video{
    object-fit:contain;
    padding:8%;
  }
  .item .caption{
    padding: 14px 16px 18px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:12px;
  }
  .item .caption .title{
    font-size:12px;
    font-weight:500;
    letter-spacing:-0.005em;
    color:var(--ink);
  }
  .item .caption .date{
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0;
    white-space:nowrap;
  }

  /* —— FOOTER —— */
  footer{
    padding: 40px 24px 60px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    font-size:11px;
    color:var(--ink-soft);
  }
  footer .contact a{
    color:var(--ink);
    text-decoration:none;
    font-weight:400;
  }
  footer .contact p{margin-bottom:4px;}

  /* —— MODAL OVERLAY —— */
  .modal{
    position:fixed;
    inset:0;
    background: rgba(255,255,255,0.98);
    z-index:1000;
    display:none;
    overflow-y:auto;
    -webkit-backdrop-filter:blur(8px);
    backdrop-filter:blur(8px);
  }
  .modal.open{display:block;}
  .modal-inner{
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }
  .modal-close{
    position:fixed;
    top:24px;
    right:24px;
    background:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    font-size:11px;
    letter-spacing:0;
    color:var(--ink);
    padding:8px 12px;
    z-index:10;
  }
  .modal-close:hover{opacity:0.5;}
  .modal-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding-bottom:24px;
    margin-bottom:32px;
    border-bottom:1px solid var(--line);
    gap:24px;
  }
  .modal-header .title-block{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .modal-header h2{
    font-size:14px;
    font-weight:500;
    letter-spacing:-0.005em;
  }
  .modal-header .idx{
    font-size:11px;
    color:var(--ink-soft);
  }
  .modal-header .date{
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
    white-space:nowrap;
  }
  .modal-desc{
    font-size:13px;
    line-height:1.7;
    max-width:560px;
    margin-bottom:48px;
    color:var(--ink);
  }
  .modal-images{
    display:grid;
    gap:8px;
    grid-template-columns: 1fr;
  }
  .modal-images.two-col{grid-template-columns: 1fr 1fr;}
  .modal-images img,
  .modal-images video{
    width:100%;
    height:auto;
    display:block;
    background:#f5f5f5;
  }

  /* —— RESPONSIVE —— */
  @media (max-width: 600px){
    header{padding: 40px 16px 24px;}
    .item .caption{padding: 10px 12px 14px;}
    .item .caption .title{font-size:11px;}
    .item .caption .date{font-size:10px;}
    .modal-inner{padding: 50px 16px 60px;}
    .modal-images.two-col{grid-template-columns: 1fr;}
    footer{padding: 24px 16px 40px;flex-direction:column;gap:16px;align-items:flex-start;}
  }
</style>
</head>
<body>

<header>
  <div class="name">Born Being</div>
  <div class="meta">I create beings</div>
</header>

<main class="feed" id="feed"></main>

<footer>
  <div class="contact">
    <p>cocohahm@gmail.com</p>
    <p>@bornbeing</p>
    <p>NYC · Seoul</p>
  </div>
  <div>© 2026</div>
</footer>

<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">Close ×</button>
  <div class="modal-inner" id="modal-content"></div>
</div>

<script>
  const works = [
    {
      id: 'cube',
      title: 'Cube Chair',
      date: '2025',
      thumb: 'cube-02.jpeg',
      thumbType: 'image',
      desc: 'A chair that asks to be solved. Pastel-toned puzzle cube on wooden legs — to sit, you must first turn the seat into place. A playful counterpoint to the rest of the practice.',
      images: [
        {src:'cube-02.jpeg', type:'image'},
        {src:'cube-04.jpeg', type:'image'},
        {src:'cube-01.jpeg', type:'image'},
        {src:'cube-03.jpeg', type:'image'},
        {src:'cube.mp4', type:'video'}
      ],
      layout:'two-col'
    },
    {
      id: 'coreless',
      title: 'Coreless Table',
      date: '2026',
      thumb: 'coreless-thumb.png',
      thumbType: 'image',
      thumbFit: 'contain',
      desc: 'A square table whose surface appears to dissolve at the center. The void is a print — a flat image of absence laid onto solid wood. The first instinct is to call it a render. It is not.',
      images: [
        {src:'coreless-01.png', type:'image'},
        {src:'coreless.mp4', type:'video'}
      ],
      layout:'two-col'
    },
    {
      id: 'layer',
      title: 'Clear Layer Wood Table',
      date: '2026',
      thumb: 'layer-01.jpeg',
      thumbType: 'image',
      desc: 'Stacked planes that fade as they descend, mimicking dropped opacity in image-editing software. The grid of wood persists, but objects beneath drift into a soft blur — confusing what is layer and what is matter.',
      images: [
        {src:'layer-01.jpeg', type:'image'},
        {src:'layer-02.jpeg', type:'image'},
        {src:'layer-04.jpeg', type:'image'},
        {src:'layer-03.jpeg', type:'image'},
        {src:'layer.mp4', type:'video'}
      ],
      layout:'two-col'
    },
    {
      id: 'chair',
      title: 'Ch Air',
      date: '2026',
      thumb: 'chair.mp4',
      thumbType: 'video',
      desc: 'Chair, separated. A wooden chair that lets the room pass through it — a body that is here and not here, like the user who lives between digital and physical and belongs fully to neither.',
      images: [
        {src:'chair.mp4', type:'video'}
      ],
      layout:'one-col'
    },
    {
      id: 'gradient',
      title: 'Clear Gradient Side Table',
      date: '2026',
      thumb: 'gradient-01.jpeg',
      thumbType: 'image',
      desc: 'A pedestal that begins as wood and ends as air. The gradient is a printed deception — books stored inside surface as ghost shapes through the fading grain.',
      images: [
        {src:'gradient-01.jpeg', type:'image'}
      ],
      layout:'one-col'
    },
    {
      id: 'speaker',
      title: 'Clear Speaker',
      date: '2026',
      thumb: 'speaker-03.jpeg',
      thumbType: 'image',
      desc: 'A speaker whose enclosure pretends to be wood while letting the woofer, the wires, the inside of itself float behind. Two finishes — solid grain and OSB. Same fiction.',
      images: [
        {src:'speaker-01.jpeg', type:'image'},
        {src:'speaker-02.jpeg', type:'image'},
        {src:'speaker-03.jpeg', type:'image'}
      ],
      layout:'two-col'
    },
    {
      id: 'carpet',
      title: 'Carpet Series',
      date: '2026',
      thumb: 'carpet-01.jpeg',
      thumbType: 'image',
      thumbFit: 'contain',
      desc: 'Three carpets carrying three impossible effects — radial blur, recursive stacking, vertical motion drag. Filters that should live only in software, woven into thread. Each pattern is a screen frozen mid-glitch.',
      images: [
        {src:'carpet-01.jpeg', type:'image'},
        {src:'carpet-02.jpeg', type:'image'},
        {src:'carpet-03.jpeg', type:'image'}
      ],
      layout:'two-col'
    },
    {
      id: 'bag',
      title: 'Clear Animal Pattern Bag',
      date: '2026',
      thumb: 'bag-02.jpeg',
      thumbType: 'image',
      desc: 'Crocodile, leopard, python — the codes of luxury translated into PVC. Animal hide can never be transparent; here it always is. The bag\'s primary function — to conceal — is inverted. Inside: nail polish, Skittles, a phone, jeans, a Snickers bar. The intimate spilled into the public.',
      images: [
        {src:'bag-01.jpeg', type:'image'},
        {src:'bag-02.jpeg', type:'image'},
        {src:'bag-03.jpeg', type:'image'}
      ],
      layout:'two-col'
    }
  ];

  const feed = document.getElementById('feed');
  works.forEach((w) => {
    const item = document.createElement('div');
    item.className = 'item';
    item.onclick = () => openModal(w.id);
    const thumbEl = w.thumbType === 'video'
      ? `<video src="${w.thumb}" autoplay muted loop playsinline></video>`
      : `<img src="${w.thumb}" alt="${w.title}" loading="lazy"/>`;
    const thumbClass = w.thumbFit === 'contain' ? 'thumb contain' : 'thumb';
    item.innerHTML = `
      <div class="${thumbClass}">${thumbEl}</div>
      <div class="caption">
        <span class="title">${w.title}</span>
        <span class="date">${w.date}</span>
      </div>
    `;
    feed.appendChild(item);
  });

  function openModal(id){
    const w = works.find(x => x.id === id);
    if(!w) return;
    const modal = document.getElementById('modal');
    const content = document.getElementById('modal-content');
    const idx = works.findIndex(x => x.id === id) + 1;
    const total = works.length;
    const pad = (n) => String(n).padStart(2,'0');

    const imagesHTML = w.images.map(img => {
      return img.type === 'video'
        ? `<video src="${img.src}" autoplay muted loop playsinline controls></video>`
        : `<img src="${img.src}" alt="${w.title}" loading="lazy"/>`;
    }).join('');

    content.innerHTML = `
      <div class="modal-header">
        <div class="title-block">
          <span class="idx">${pad(idx)} / ${pad(total)}</span>
          <h2>${w.title}</h2>
        </div>
        <span class="date">${w.date}</span>
      </div>
      <p class="modal-desc">${w.desc}</p>
      <div class="modal-images ${w.layout === 'two-col' ? 'two-col' : ''}">
        ${imagesHTML}
      </div>
    `;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    window.scrollTo({top:0});
  }

  function closeModal(){
    const modal = document.getElementById('modal');
    modal.classList.remove('open');
    document.body.style.overflow = '';
    modal.querySelectorAll('video').forEach(v => v.pause());
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeModal();
  });
  document.getElementById('modal').addEventListener('click', e => {
    if(e.target.id === 'modal') closeModal();
  });
</script>

</body>
</html>
